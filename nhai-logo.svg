<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="97" fill="#1a3a6b" stroke="#f0c060" stroke-width="4"/>
  <!-- Outer text band -->
  <circle cx="100" cy="100" r="87" fill="#1a3a6b" stroke="#f0c060" stroke-width="1"/>
  <!-- White inner disc -->
  <circle cx="100" cy="100" r="72" fill="white"/>
  <!-- Blue inner disc -->
  <circle cx="100" cy="100" r="68" fill="#1a3a6b"/>

  <!-- Ashoka wheel at center top -->
  <circle cx="100" cy="68" r="18" fill="none" stroke="#f0c060" stroke-width="2"/>
  <circle cx="100" cy="68" r="5" fill="#f0c060"/>
  <!-- 12 spokes -->
  <line x1="100" y1="50" x2="100" y2="86" stroke="#f0c060" stroke-width="1.2"/>
  <line x1="82" y1="68" x2="118" y2="68" stroke="#f0c060" stroke-width="1.2"/>
  <line x1="85" y1="53" x2="115" y2="83" stroke="#f0c060" stroke-width="1.2"/>
  <line x1="115" y1="53" x2="85" y2="83" stroke="#f0c060" stroke-width="1.2"/>
  <line x1="91" y1="50" x2="109" y2="86" stroke="#f0c060" stroke-width="0.8"/>
  <line x1="109" y1="50" x2="91" y2="86" stroke="#f0c060" stroke-width="0.8"/>
  <line x1="82" y1="59" x2="118" y2="77" stroke="#f0c060" stroke-width="0.8"/>
  <line x1="82" y1="77" x2="118" y2="59" stroke="#f0c060" stroke-width="0.8"/>

  <!-- Highway road icon below wheel -->
  <!-- Road -->
  <path d="M100 90 L86 138 L114 138 Z" fill="#4a7fc1" opacity="0.5"/>
  <path d="M92 90 L82 138" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M108 90 L118 138" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Center dashes -->
  <rect x="98" y="96" width="4" height="8" rx="1" fill="white"/>
  <rect x="98" y="110" width="4" height="8" rx="1" fill="white"/>
  <rect x="98" y="124" width="4" height="8" rx="1" fill="white"/>

  <!-- NHAI text arc at bottom of inner circle -->
  <path id="nhaiArc" d="M 42 118 A 60 60 0 0 0 158 118" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="17" fill="#f0c060" letter-spacing="5">
    <textPath href="#nhaiArc" startOffset="15%">N H A I</textPath>
  </text>

  <!-- Outer ring text — top arc -->
  <path id="topRingArc" d="M 16 100 A 84 84 0 1 1 184 100" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="#f0c060" letter-spacing="1.8">
    <textPath href="#topRingArc" startOffset="5%">NATIONAL HIGHWAYS AUTHORITY OF INDIA</textPath>
  </text>
</svg>

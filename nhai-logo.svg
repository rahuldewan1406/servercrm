<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring - dark blue -->
  <circle cx="100" cy="100" r="98" fill="#1a3a6b" stroke="#f0c060" stroke-width="3"/>
  <!-- Inner ring - white -->
  <circle cx="100" cy="100" r="82" fill="white" stroke="#1a3a6b" stroke-width="2"/>
  <!-- Middle ring - blue -->
  <circle cx="100" cy="100" r="75" fill="#1a3a6b"/>

  <!-- Road / highway icon in center -->
  <!-- Road surface -->
  <ellipse cx="100" cy="115" rx="28" ry="12" fill="#4a90d9" opacity="0.6"/>
  <!-- Road lines -->
  <rect x="97" y="80" width="6" height="12" rx="2" fill="white" opacity="0.9"/>
  <rect x="97" y="98" width="6" height="12" rx="2" fill="white" opacity="0.9"/>
  <rect x="97" y="116" width="6" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- Road edges -->
  <path d="M78 75 Q72 115 70 135" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M122 75 Q128 115 130 135" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Ashoka chakra style spokes at top -->
  <circle cx="100" cy="62" r="14" fill="none" stroke="#f0c060" stroke-width="2"/>
  <circle cx="100" cy="62" r="4" fill="#f0c060"/>
  <line x1="100" y1="48" x2="100" y2="76" stroke="#f0c060" stroke-width="1.5"/>
  <line x1="86" y1="62" x2="114" y2="62" stroke="#f0c060" stroke-width="1.5"/>
  <line x1="90" y1="52" x2="110" y2="72" stroke="#f0c060" stroke-width="1.5"/>
  <line x1="110" y1="52" x2="90" y2="72" stroke="#f0c060" stroke-width="1.5"/>

  <!-- NHAI text at bottom of inner circle -->
  <path id="bottomArc" d="M 30 100 A 70 70 0 0 0 170 100" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="800" font-size="18" fill="#f0c060" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="18%">N H A I</textPath>
  </text>

  <!-- Outer ring text -->
  <path id="topArc" d="M 12 100 A 88 88 0 1 1 188 100" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#f0c060" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="8%">NATIONAL HIGHWAYS AUTHORITY OF INDIA</textPath>
  </text>
</svg>
